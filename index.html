<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <title>Gear Shift</title>
  <style>
    :root {
      --bg: #000;
      --box: #111;
      --border: #2f2f2f;
      --text: #fff;
      --active: #1ed760;
      --activeText: #000;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100vh;
      max-width: 320px;
      max-height: 568px;
      background: #000;
      overflow: hidden;
    }

    .unlock {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 10;
      background: #151515;
      color: #fff;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }

    .unlock button {
      margin-top: 8px;
      width: 100%;
      height: 44px;
      border: 0;
      border-radius: 8px;
      background: #1ed760;
      color: #000;
      font-weight: 700;
      font-size: 16px;
    }

    .gear-panel {
      position: absolute;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      gap: 7px;
      align-items: center;
      z-index: 5;
    }

    .gear-btn {
      width: 54px;
      height: 54px;
      border-radius: 8px;
      border: 2px solid var(--border);
      background: var(--box);
      color: var(--text);
      font-size: 24px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
    }

    .gear-btn.active {
      background: var(--active);
      color: var(--activeText);
      border-color: var(--active);
    }

    .camera-box,
    .image-box {
      position: absolute;
      bottom: 10px;
      width: 92px;
      height: 138px;
      background: #111;
      border: 2px solid #2d2d2d;
      border-radius: 10px;
      overflow: hidden;
      z-index: 2;
      display: none;
    }

    .camera-box.show,
    .image-box.show {
      display: block;
    }

    .camera-box {
      left: 10px;
    }

    .image-box {
      right: 10px;
    }

    .camera-label,
    .image-label {
      position: absolute;
      top: 4px;
      left: 4px;
      z-index: 3;
      font-size: 10px;
      background: rgba(0,0,0,.6);
      padding: 2px 6px;
      border-radius: 4px;
      color: #fff;
    }

    video,
    .reverse-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #111;
    }

    video {
      transform: scaleX(-1);
    }

    .status {
      position: absolute;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      width: 90px;
      font-size: 10px;
      color: #aaa;
      line-height: 1.3;
      text-align: center;
      z-index: 6;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="unlock" id="unlockBox">
      Tap once to enable sound and camera
      <button id="startBtn">Start</button>
    </div>

    <div class="gear-panel">
      <div class="gear-btn active" data-gear="P">P</div>
      <div class="gear-btn" data-gear="R">R</div>
      <div class="gear-btn" data-gear="N">N</div>
      <div class="gear-btn" data-gear="D">D</div>
      <div class="gear-btn" data-gear="2">2</div>
      <div class="gear-btn" data-gear="L">L</div>
    </div>

    <div class="camera-box" id="cameraBox">
      <div class="camera-label">Front Camera</div>
      <video id="video" playsinline autoplay muted></video>
    </div>

    <div class="image-box" id="imageBox">
      <div class="image-label">Reverse View</div>
      <img src="reverse-guide.jpg" alt="Reverse Guide" class="reverse-image" />
    </div>

    <div class="status" id="status">Waiting to start</div>
  </div>

  <script>
    const gearButtons = document.querySelectorAll('.gear-btn');
    const statusEl = document.getElementById('status');
    const startBtn = document.getElementById('startBtn');
    const unlockBox = document.getElementById('unlockBox');
    const video = document.getElementById('video');
    const cameraBox = document.getElementById('cameraBox');
    const imageBox = document.getElementById('imageBox');

    let audioCtx = null;
    let beepTimer = null;
    let stream = null;
    let started = false;
    let currentGear = 'P';

    function updateStatus(msg) {
      statusEl.textContent = msg;
    }

    function createAudio() {
      if (!audioCtx) {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (Ctx) audioCtx = new Ctx();
      }
      return audioCtx;
    }

    async function unlockAudio() {
      const ctx = createAudio();
      if (!ctx) {
        updateStatus('Audio not supported');
        return;
      }

      if (ctx.state === 'suspended') {
        await ctx.resume();
      }

      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      gain.gain.value = 0.0001;
      osc.frequency.value = 440;
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 0.03);
    }

    function playBeep() {
      if (!audioCtx) return;

      const t = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = 'square';
      osc.frequency.setValueAtTime(900, t);

      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.exponentialRampToValueAtTime(0.12, t + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.20);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start(t);
      osc.stop(t + 0.20);
    }

    function startReverseBeep() {
      stopReverseBeep();
      playBeep();
      beepTimer = setInterval(() => {
        if (audioCtx && audioCtx.state === 'running') {
          playBeep();
        }
      }, 700);
    }

    function stopReverseBeep() {
      if (beepTimer) {
        clearInterval(beepTimer);
        beepTimer = null;
      }
    }

    async function startCamera() {
      if (stream) return true;

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        updateStatus('Camera API not supported');
        return false;
      }

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user' },
          audio: false
        });

        video.srcObject = stream;
        await video.play().catch(() => {});
        return true;
      } catch (err) {
        console.error(err);
        if (
          location.protocol !== 'https:' &&
          location.hostname !== 'localhost' &&
          location.hostname !== '127.0.0.1'
        ) {
          updateStatus('Camera needs HTTPS or localhost on iPhone');
        } else {
          updateStatus('Camera permission denied or unavailable');
        }
        return false;
      }
    }

    function stopCamera() {
      if (video.srcObject) {
        const tracks = video.srcObject.getTracks();
        tracks.forEach(track => track.stop());
        video.srcObject = null;
      }

      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }

      cameraBox.classList.remove('show');
    }

    function showReversePanels(show) {
      cameraBox.classList.toggle('show', show);
      imageBox.classList.toggle('show', show);
    }

    async function updateReverseDisplay(gear) {
      if (gear === 'R') {
        const ok = await startCamera();
        if (ok) {
          showReversePanels(true);
        } else {
          imageBox.classList.add('show');
          cameraBox.classList.remove('show');
        }
      } else {
        stopCamera();
        showReversePanels(false);
      }
    }

    async function setGear(gear) {
      currentGear = gear;

      gearButtons.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.gear === gear);
      });

      if (gear === 'R') {
        startReverseBeep();
      } else {
        stopReverseBeep();
      }

      await updateReverseDisplay(gear);
      updateStatus('Selected gear: ' + gear);
    }

    async function startApp() {
      if (started) return;
      started = true;

      await unlockAudio();
      unlockBox.style.display = 'none';
      await setGear('P');
    }

    startBtn.addEventListener('click', startApp);

    gearButtons.forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!started) {
          await startApp();
        }
        await setGear(btn.dataset.gear);
      });
    });

    document.addEventListener('visibilitychange', async () => {
      if (document.hidden) {
        stopReverseBeep();
        stopCamera();
        showReversePanels(false);
      } else {
        if (audioCtx && audioCtx.state === 'suspended') {
          try {
            await audioCtx.resume();
          } catch (e) {}
        }

        if (currentGear === 'R') {
          startReverseBeep();
          await updateReverseDisplay('R');
        }
      }
    });
  </script>
</body>
</html>
